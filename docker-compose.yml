version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: costeos_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: costeos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql # Ejecuta el esquema al iniciar la BD vacía a través de init.sql

volumes:
  postgres_data:
